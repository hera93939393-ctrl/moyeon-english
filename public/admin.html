<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>모연 English 예약 관리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap');
:root{--navy:#17324d;--coral:#ff7058;--yellow:#ffd65a;--paper:#fffaf0;--ink:#172534}*{box-sizing:border-box}body{margin:0;padding:28px;color:var(--ink);background:var(--paper);font-family:"Gowun Dodum",sans-serif}.wrap{width:min(1100px,100%);margin:auto}header{display:flex;justify-content:space-between;align-items:end;gap:20px;margin-bottom:24px}h1{margin:0;font:400 36px "Jua",sans-serif}button{padding:10px 15px;color:#fff;background:var(--navy);border:2px solid var(--ink);border-radius:10px;font:400 16px "Jua",sans-serif;box-shadow:3px 3px 0 var(--coral);cursor:pointer}.summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}.badge{padding:8px 12px;background:#fff;border:2px solid var(--ink);border-radius:999px}.table-wrap{overflow:auto;background:#fff;border:3px solid var(--ink);border-radius:18px;box-shadow:7px 7px 0 var(--yellow)}table{width:100%;border-collapse:collapse;min-width:850px}th,td{padding:12px;text-align:left;border-bottom:1px solid #ddd}th{background:var(--navy);color:#fff;font-family:"Jua",sans-serif;font-weight:400}tr:last-child td{border:0}.cancelled{opacity:.5}.empty{padding:36px;text-align:center}.note{margin-top:18px;color:#667;font-size:14px}@media(max-width:650px){body{padding:18px}header{align-items:start;flex-direction:column}h1{font-size:30px}}
.curriculum{padding:20px 24px;margin-bottom:18px;background:#fff;border:3px solid var(--ink);border-radius:18px;box-shadow:6px 6px 0 var(--yellow)}.curriculum h2{margin:0 0 6px;font:400 22px "Jua",sans-serif}.curriculum .muted{margin:0 0 14px;color:#667;font-size:14px}.curriculum form{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.curriculum input[type=file]{flex:1;min-width:220px;padding:9px;background:#fff;border:2px solid var(--ink);border-radius:10px}.curriculum .result{margin:12px 0 0;padding:10px 13px;border:2px solid var(--ink);border-radius:10px;display:none}.curriculum .result.show{display:block}.curriculum .result.error{color:#8a251a;background:#ffe2dc}.curriculum .result.ok{color:#155c3d;background:#e2f5ea}
</style></head><body><main class="wrap"><header><div><h1>모연 English 예약 관리</h1><p>레벨 테스트 예약과 문자 리마인더 대상을 확인하세요.</p></div><button id="refresh">새로고침</button></header><div class="summary"><span id="total" class="badge">예약 확인 중…</span><span id="reminders" class="badge">문자 대상 확인 중…</span></div>
<section class="curriculum">
  <h2>📎 커리큘럼 자료 업로드</h2>
  <p id="curriculum-status" class="muted">불러오는 중…</p>
  <form id="curriculum-form">
    <input type="file" id="curriculum-file" accept=".pdf,.txt" required>
    <button type="submit">업로드</button>
  </form>
  <p id="curriculum-result" class="result"></p>
</section>
<div class="table-wrap"><table><thead><tr><th>학생</th><th>학년</th><th>연락처</th><th>학교</th><th>일시</th><th>상태</th></tr></thead><tbody id="rows"></tbody></table><p id="empty" class="empty" hidden>아직 예약이 없습니다.</p></div><p class="note">개인정보는 예약 확인 목적으로만 사용하며 수집 후 30일이 지나면 자동 삭제됩니다. 이 화면은 관리자 로그인으로 보호되고 있습니다.</p></main>
<script>
const rows=document.querySelector('#rows');
async function load(){const [data,due]=await Promise.all([fetch('/api/reservations').then(r=>r.json()),fetch('/api/reminders/due').then(r=>r.json())]);rows.textContent='';const active=data.reservations.filter(item=>item.status==='confirmed').length;document.querySelector('#total').textContent=`확정 ${active}명 / 정원 ${data.capacity}명`;document.querySelector('#reminders').textContent=`내일 문자 대상 ${due.reminders.length}명`;document.querySelector('#empty').hidden=data.reservations.length>0;data.reservations.forEach(item=>{const tr=document.createElement('tr');if(item.status!=='confirmed')tr.className='cancelled';[item.studentName,item.studentGrade,item.phone,item.school,item.slotId.replace('|',' '),item.status==='confirmed'?'확정':'취소'].forEach(value=>{const td=document.createElement('td');td.textContent=value;tr.append(td)});rows.append(tr)})}
document.querySelector('#refresh').addEventListener('click',load);load();

const curriculumStatus=document.querySelector('#curriculum-status');
const curriculumResult=document.querySelector('#curriculum-result');
function showCurriculumResult(message,isError){curriculumResult.textContent=message;curriculumResult.className='result show'+(isError?' error':' ok')}
async function loadCurriculumStatus(){
  const data=await fetch('/api/curriculum').then(r=>r.json());
  const engine=data.aiEnabled?'AI(Claude)가':'파일 검색 방식이';
  if(data.document){curriculumStatus.textContent=`현재 자료: ${data.document.filename} (${new Date(data.document.uploadedAt).toLocaleString('ko-KR')} 업로드, ${data.document.length.toLocaleString()}자) — 학부모 질문에 ${engine} 이 내용을 참고해 답변해요.`}
  else{curriculumStatus.textContent=`아직 업로드된 커리큘럼 자료가 없어요. 업로드하면 ${engine} 참고해 답변해요.`}
}
document.querySelector('#curriculum-form').addEventListener('submit',async event=>{
  event.preventDefault();
  const fileInput=document.querySelector('#curriculum-file');
  if(!fileInput.files[0])return;
  const formData=new FormData();formData.append('file',fileInput.files[0]);
  try{
    const response=await fetch('/api/curriculum',{method:'POST',body:formData});
    const data=await response.json();
    if(!response.ok)throw new Error(data.error||'업로드에 실패했어요.');
    showCurriculumResult(`✅ ${data.filename} 업로드 완료 (${data.length.toLocaleString()}자)`,false);
    fileInput.value='';
    await loadCurriculumStatus();
  }catch(error){showCurriculumResult('⚠️ '+error.message,true)}
});
loadCurriculumStatus();
</script></body></html>
